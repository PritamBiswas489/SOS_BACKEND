<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title>KobyTech - iOS Access Request Reply</title>
  <style>
    body, html { margin: 0; padding: 0; background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; }
    @media only screen and (max-width: 600px) {
      .email-wrapper { width: 100% !important; border-radius: 0 !important; }
      .inner-pad { padding: 22px 18px !important; }
      .title { font-size: 18px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f0f2f5;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f0f2f5;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table class="email-wrapper" width="600" cellpadding="0" cellspacing="0" border="0"
          style="background:#ffffff;border-radius:12px;border:1px solid #e4e7ef;overflow:hidden;">

          <tr>
            <td class="inner-pad" style="padding:20px 28px;border-bottom:1px solid #e8eaf2;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="width:36px;height:36px;background:linear-gradient(135deg,#f7502f,#7b5cff);border-radius:8px;text-align:center;vertical-align:middle;">
                    <span style="font-size:15px;font-weight:700;color:#ffffff;line-height:36px;">K</span>
                  </td>
                  <td style="padding-left:10px;font-size:17px;font-weight:700;color:#1a1d2e;font-family:'Segoe UI',Arial,sans-serif;letter-spacing:-0.2px;">
                    Koby<span style="color:#f7502f;">Tech</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td class="inner-pad" style="padding:30px 28px 22px;border-bottom:1px solid #e8eaf2;text-align:center;">
              <p class="title" style="font-size:22px;font-weight:700;color:#0f1220;margin:0 0 8px;line-height:1.3;letter-spacing:-0.3px;font-family:'Segoe UI',Arial,sans-serif;">
                iOS Access Request Update
              </p>
              <p style="font-size:14px;color:#6b7385;line-height:1.7;margin:0 auto;max-width:430px;font-family:'Segoe UI',Arial,sans-serif;">
                Hello <strong style="color:#1a1d2e;">{{USER_NAME}}</strong>, we have reviewed your iOS access request.
              </p>
            </td>
          </tr>

          <tr>
            <td class="inner-pad" style="padding:24px 28px;border-bottom:1px solid #e8eaf2;">
              <p style="font-size:10.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:#9ba3b8;margin:0 0 12px;font-family:'Segoe UI',Arial,sans-serif;">
                Request ID
              </p>
              <p style="margin:0 0 16px;font-size:16px;font-weight:700;color:#1a1d2e;font-family:'Segoe UI',Arial,sans-serif;">
                #{{REQUEST_ID}}
              </p>

              <p style="font-size:10.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:#9ba3b8;margin:0 0 12px;font-family:'Segoe UI',Arial,sans-serif;">
                Support Reply
              </p>
              <table width="100%" cellpadding="0" cellspacing="0" border="0"
                style="background:#f7f8fc;border:1px solid #eeeff5;border-left:4px solid #f7502f;border-radius:10px;">
                <tr>
                  <td style="padding:14px 14px 14px 12px;font-size:14px;color:#243041;line-height:1.7;font-family:'Segoe UI',Arial,sans-serif;">
                    {{REPLY_MESSAGE}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td class="inner-pad" style="padding:18px 28px 28px;">
              <p style="margin:0;font-size:13px;color:#7b8294;line-height:1.7;font-family:'Segoe UI',Arial,sans-serif;">
                Regards,<br/>KobyTech Support Team
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
